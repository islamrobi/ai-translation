<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Translate - English to Bangla</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 48px 16px;
        background: #f5f6fb;
        color: #1f2430;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        line-height: 1.6;
      }
      .card {
        max-width: 640px;
        margin: 0 auto;
        background: #fff;
        border: 1px solid #e2e6ee;
        border-radius: 16px;
        padding: 32px 36px;
        box-shadow: 0 12px 40px rgba(20, 24, 35, 0.08);
        text-align: center;
      }
      .logo {
        width: 64px;
        height: 64px;
        border-radius: 16px;
        background: linear-gradient(135deg, #4f46e5, #7c3aed);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        margin-bottom: 16px;
      }
      .logo svg {
        width: 60%;
        height: 60%;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }
      p {
        color: #5b6373;
        margin: 0 0 20px;
      }
      a.btn {
        display: inline-block;
        padding: 10px 18px;
        background: #4f46e5;
        color: #fff;
        text-decoration: none;
        border-radius: 10px;
        font-weight: 600;
      }
      a.btn:hover {
        background: #4338ca;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M10 1.5 L11.9 8.1 L18.5 10 L11.9 11.9 L10 18.5 L8.1 11.9 L1.5 10 L8.1 8.1 Z" />
          <path d="M18.5 14.5 L19.42 17.58 L22.5 18.5 L19.42 19.42 L18.5 22.5 L17.58 19.42 L14.5 18.5 L17.58 17.58 Z" />
        </svg>
      </div>
      <h1>AI Translate - English to Bangla</h1>
      <p>
        A Chrome extension that translates English to Bengali (Bangla) with AI.
        Select text, right-click, and see the translation, meaning, and examples
        in a tooltip.
      </p>
      <p>
        <a class="btn" href="privacy.html">Privacy Policy</a>
      </p>
    </main>
  </body>
</html>
