<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AI Translate - English to Bangla</title>
    <style>
      body {
        width: 260px;
        margin: 0;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        color: #1f2430;
        background: #fff;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
      }
      .logo {
        width: 36px;
        height: 36px;
        border-radius: 9px;
        background: linear-gradient(135deg, #4f46e5, #7c3aed);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .logo svg {
        width: 60%;
        height: 60%;
        display: block;
      }
      h1 {
        font-size: 15px;
        margin: 0;
      }
      p {
        font-size: 13px;
        color: #6b7280;
        margin: 0 0 14px;
        line-height: 1.45;
      }
      #status {
        font-size: 12px;
        margin: 0 0 12px;
        padding: 8px 10px;
        border-radius: 8px;
      }
      #status.ok {
        background: #ecfdf3;
        color: #18794e;
      }
      #status.warn {
        background: #fffaeb;
        color: #b54708;
      }
      button {
        width: 100%;
        padding: 10px;
        font-size: 14px;
        font-weight: 600;
        color: #fff;
        background: #4f46e5;
        border: none;
        border-radius: 9px;
        cursor: pointer;
      }
      button:hover {
        background: #4338ca;
      }
    </style>
  </head>
  <body>
    <div class="row">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M10 1.5 L11.9 8.1 L18.5 10 L11.9 11.9 L10 18.5 L8.1 11.9 L1.5 10 L8.1 8.1 Z" />
          <path d="M18.5 14.5 L19.42 17.58 L22.5 18.5 L19.42 19.42 L18.5 22.5 L17.58 19.42 L14.5 18.5 L17.58 17.58 Z" />
        </svg>
      </div>
      <h1>AI Translate</h1>
    </div>
    <p>Select text on a page, right-click, and choose <strong>“AI Translate (E2B)”</strong> to see the Bengali translation.</p>
    <div id="status"></div>
    <button id="open-settings" type="button">Open settings</button>
    <script src="popup.js"></script>
  </body>
</html>
